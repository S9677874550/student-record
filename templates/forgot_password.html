<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Forgot Password - Student Registry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
<div class="auth-box">
    <span class="brand-badge auth-badge">SR</span>
    <h2>Forgot Password</h2>
    <p class="auth-subtitle">Enter your registered phone number. We'll send a One-Time Password (OTP) to verify it's you.</p>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="phone" placeholder="Registered Phone Number" required>
        <button type="submit" class="btn btn-primary btn-block">Send OTP</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
</div>
</div>
</body>
</html>
