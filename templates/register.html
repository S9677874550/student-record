<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Create Account - Student Registry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
<div class="auth-box">
    <span class="brand-badge auth-badge">SR</span>
    <h2>Create your account</h2>
    <p class="auth-subtitle">Join the Student Registry</p>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="POST" id="registerForm">
        <input type="text" id="username" name="username" placeholder="Username" required>
        <input type="text" id="phone" name="phone" placeholder="Phone Number" required>
        <input type="email" id="email" name="email" placeholder="Gmail Address" required>
        <input type="password" id="password" name="password" placeholder="Password (min 6 chars)" required>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
</div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
