<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Verify OTP - Student Registry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
<div class="auth-box">
    <span class="brand-badge auth-badge">SR</span>
    <h2>Verify OTP</h2>
    <p class="auth-subtitle">
        Enter the 6-digit OTP sent to <strong>{{ phone }}</strong>.
        It expires in 5 minutes.
    </p>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p class="success-msg">{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="text" name="otp" class="otp-input" placeholder="• • • • • •" maxlength="6" required>
        <button type="submit" class="btn btn-primary btn-block">Verify OTP</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('forgot_password') }}">Resend OTP</a>
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
</div>
</div>
</body>
</html>
