<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Set New Password - Student Registry</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="auth-shell">
<div class="auth-box">
    <span class="brand-badge auth-badge">SR</span>
    <h2>Set New Password</h2>
    <p class="auth-subtitle">OTP verified. Enter your new password below.</p>

    {% if error %}
        <p class="error-msg">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="password" name="new_password" placeholder="New Password (min 6 chars)" required>
        <input type="password" name="confirm_password" placeholder="Confirm New Password" required>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
    </form>

    <div class="auth-links">
        <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
</div>
</div>
</body>
</html>
